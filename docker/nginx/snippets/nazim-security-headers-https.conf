# Browser security headers (HTTPS). Included at server level; re-included in any
# location that sets its own add_header (nginx stops inheriting parent add_header).

server_tokens off;

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# camera/microphone=(self): student photo / event check-in capture on same origin
add_header Permissions-Policy "accelerometer=(), camera=(self), microphone=(self), geolocation=(), gyroscope=(), magnetometer=(), payment=(), usb=()" always;
# frame-src: PDF/blob previews + public site (YouTube, Google Maps embeds)
# script-src 'unsafe-eval': required by client-side pdfmake (font/layout pipeline uses dynamic eval)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self'; frame-src 'self' blob: data: https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://www.google.com https://*.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; worker-src 'self'; manifest-src 'self'; media-src 'self' blob: data:; upgrade-insecure-requests" always;
