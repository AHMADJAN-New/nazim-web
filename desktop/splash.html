<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nazim</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }
    .logo { width: 80px; height: 80px; margin-bottom: 1.5rem; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem 0; }
    p { font-size: 0.875rem; color: #94a3b8; margin: 0; }
    .spinner {
      width: 32px; height: 32px;
      margin-top: 2rem;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%233b82f6' width='100' height='100' rx='12'/%3E%3Ctext x='50' y='62' font-size='40' fill='white' text-anchor='middle' font-family='system-ui'%3EN%3C/text%3E%3C/svg%3E" alt="Nazim">
  </div>
  <h1>Nazim</h1>
  <p>Loading application…</p>
  <div class="spinner" aria-hidden="true"></div>
</body>
</html>
