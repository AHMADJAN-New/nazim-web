<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connection failed – Nazim</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: 1.5rem;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      margin-bottom: 1rem;
      color: #dc2626;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem 0; }
    .message { font-size: 0.875rem; color: #64748b; margin: 0 0 1.5rem 0; max-width: 360px; word-break: break-word; }
    .url { font-size: 0.75rem; color: #94a3b8; margin-bottom: 1.5rem; word-break: break-all; }
    button {
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: white;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
  </svg>
  <h1>Cannot connect</h1>
  <p class="message" id="message">The application could not be loaded. Please check your internet connection and try again.</p>
  <p class="url" id="url"></p>
  <button type="button" id="retry-btn">Retry</button>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var message = params.get('message');
      var url = params.get('url');
      if (message) {
        try { message = decodeURIComponent(message); } catch (e) {}
        document.getElementById('message').textContent = message;
      }
      if (url) {
        try { url = decodeURIComponent(url); } catch (e) {}
        document.getElementById('url').textContent = url;
      }
      document.getElementById('retry-btn').addEventListener('click', function() {
        if (window.electron && typeof window.electron.retryLoad === 'function') {
          window.electron.retryLoad();
        }
      });
    })();
  </script>
</body>
</html>
